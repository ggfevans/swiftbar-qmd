name: Trivy Security Scan

on:
  schedule:
    - cron: '0 2 * * 1'  # Mondays 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: trivy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  trivy:
    name: Trivy (fs + config + secret)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Trivy fs scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          format: sarif
          output: trivy-results-fs.sarif
          exit-code: '0'
          ignore-unfixed: false

      - name: Trivy config scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: config
          format: sarif
          output: trivy-results-config.sarif
          exit-code: '0'

      - name: Trivy secret scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          scanners: secret
          format: sarif
          output: trivy-results-secret.sarif
          exit-code: '0'

      - name: Upload fs SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@f411752efdf656cb71aa17b755b22c890960da1d # v3.35.5
        with:
          sarif_file: trivy-results-fs.sarif
          category: trivy-fs

      - name: Upload config SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@f411752efdf656cb71aa17b755b22c890960da1d # v3.35.5
        with:
          sarif_file: trivy-results-config.sarif
          category: trivy-config

      - name: Upload secret SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@f411752efdf656cb71aa17b755b22c890960da1d # v3.35.5
        with:
          sarif_file: trivy-results-secret.sarif
          category: trivy-secret

      - name: Upload SARIF artefacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: trivy-sarif
          path: trivy-results-*.sarif
          retention-days: 14